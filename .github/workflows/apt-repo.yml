# Build .deb package and publish APT repository to GitHub Pages
# Triggers on releases or manual dispatch
name: APT Repository

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  REPO_NAME: plexinstaller
  CODENAME: stable
  COMPONENTS: main
  ARCHITECTURES: amd64

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      keyring: ${{ steps.create-apt-repo.outputs.keyring }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version from version.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building plexinstaller v${VERSION}"

      - name: Build .deb package
        run: |
          chmod +x debian/build-deb.sh
          debian/build-deb.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Create APT repository
        uses: morph027/apt-repo-action@v3
        id: create-apt-repo
        with:
          repo-name: ${{ env.REPO_NAME }}
          signing-key: ${{ secrets.APT_SIGNING_KEY }}
          codename: ${{ env.CODENAME }}
          components: ${{ env.COMPONENTS }}
          architectures: ${{ env.ARCHITECTURES }}
          scan-dir: dist
          import-from-repo-url: |
            deb https://apt.plexdev.xyz ${{ env.CODENAME }} ${{ env.COMPONENTS }}
          import-from-repo-failure-allow: true

      - name: Add CNAME and public key to output
        run: |
          cp CNAME ${{ steps.create-apt-repo.outputs.dir }}/CNAME
          echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import 2>/dev/null
          gpg --armor --export apt@plexdev.xyz > ${{ steps.create-apt-repo.outputs.dir }}/key.gpg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ${{ steps.create-apt-repo.outputs.dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add install instructions to summary
        run: |
          echo '## APT Repository Published :rocket:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Add the repository to your system:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Add the signing key' >> $GITHUB_STEP_SUMMARY
          echo 'curl -fsSL https://apt.plexdev.xyz/gpg.key | sudo tee /etc/apt/trusted.gpg.d/${{ needs.build.outputs.keyring }}.asc > /dev/null' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Add the repository' >> $GITHUB_STEP_SUMMARY
          echo 'echo "deb https://apt.plexdev.xyz stable main" | sudo tee /etc/apt/sources.list.d/plexinstaller.list' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Install' >> $GITHUB_STEP_SUMMARY
          echo 'sudo apt update && sudo apt install plexinstaller' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
