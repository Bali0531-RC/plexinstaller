name: CI

on:
  push:
    branches: [windows-experimental]
  pull_request:
    branches: [windows-experimental]
  workflow_dispatch:

jobs:
  quality:
    name: Quality (Python 3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and development extras
        run: python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check addon_manager.py backup_manager.py config.py health_checker.py installer.py mongodb_manager.py plex_cli.py release_windows.py shared.py telemetry_client.py utils.py
      - name: Ruff format check
        run: ruff format --check addon_manager.py backup_manager.py config.py health_checker.py installer.py mongodb_manager.py plex_cli.py release_windows.py shared.py telemetry_client.py utils.py
      - name: Mypy type check
        run: mypy addon_manager.py backup_manager.py config.py health_checker.py installer.py mongodb_manager.py plex_cli.py release_windows.py shared.py telemetry_client.py utils.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project and development extras
        run: python -m pip install -e ".[dev]"
      - name: Run tests with branch coverage
        run: pytest tests/ -v --tb=short --cov --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=40

  release-integrity:
    name: Windows release integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install release test dependencies
        run: python -m pip install pytest
      - name: Verify versions, channel, hashes, key, and signature
        run: python -m pytest tests/test_release_metadata.py -v --tb=short
