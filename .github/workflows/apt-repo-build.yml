# Build .deb package and publish APT repository to GitHub Pages
# Triggers on releases or manual dispatch
name: APT Repository Build 2

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  REPO_NAME: plexinstaller
  CODENAME: stable
  COMPONENTS: main
  ARCHITECTURES: amd64
  APT_SIGNING_FINGERPRINT: C1D43E70EF36AB0B47151196B669DC325581C77B

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version from version.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building plexinstaller v${VERSION}"

      - name: Build .deb package
        run: |
          chmod +x debian/build-deb.sh
          debian/build-deb.sh

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import GPG key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          printf '%s' "$APT_SIGNING_KEY" | gpg --batch --import

      - name: Verify dedicated APT signing key
        run: |
          if ! gpg --batch --with-colons --list-secret-keys "$APT_SIGNING_FINGERPRINT" \
            | awk -F: -v expected="$APT_SIGNING_FINGERPRINT" '$1 == "fpr" && toupper($10) == expected { found=1 } END { exit !found }'; then
            echo "APT_SIGNING_KEY does not contain the required key $APT_SIGNING_FINGERPRINT" >&2
            exit 1
          fi

      - name: Create APT repository
        run: |
          REPO_DIR=$(mktemp -d)
          mkdir -p "${REPO_DIR}/conf"

          # Create distributions config
          cat > "${REPO_DIR}/conf/distributions" <<EOF
          Origin: ${{ env.REPO_NAME }}
          Label: ${{ env.REPO_NAME }}
          Suite: ${{ env.CODENAME }}
          Codename: ${{ env.CODENAME }}
          Components: ${{ env.COMPONENTS }}
          Architectures: ${{ env.ARCHITECTURES }}
          SignWith: ${{ env.APT_SIGNING_FINGERPRINT }}
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "${REPO_DIR}/conf/distributions"

          echo "=== distributions config ==="
          cat "${REPO_DIR}/conf/distributions"

          # Include all .deb packages
          for deb in dist/*.deb; do
            echo "Including ${deb}..."
            reprepro -b "${REPO_DIR}" -C ${{ env.COMPONENTS }} includedeb ${{ env.CODENAME }} "${deb}"
          done

          # Export public key
          gpg --armor --export "${{ env.APT_SIGNING_FINGERPRINT }}" > "${REPO_DIR}/gpg.key"
          test -s "${REPO_DIR}/gpg.key"

          # Copy CNAME for custom domain
          cp CNAME "${REPO_DIR}/CNAME"

          echo "repo_dir=${REPO_DIR}" >> "$GITHUB_OUTPUT"
        id: repo

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ${{ steps.repo.outputs.repo_dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add install instructions to summary
        run: |
          echo '## APT Repository Published :rocket:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Add the repository to your system:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Add the signing key' >> $GITHUB_STEP_SUMMARY
          echo 'curl -fsSL https://apt.plexdev.xyz/gpg.key | sudo tee /usr/share/keyrings/plexinstaller-archive-keyring.asc > /dev/null' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Add the repository' >> $GITHUB_STEP_SUMMARY
          echo 'echo "deb [signed-by=/usr/share/keyrings/plexinstaller-archive-keyring.asc] https://apt.plexdev.xyz stable main" | sudo tee /etc/apt/sources.list.d/plexinstaller.list' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Install' >> $GITHUB_STEP_SUMMARY
          echo 'sudo apt update && sudo apt install plexinstaller' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
