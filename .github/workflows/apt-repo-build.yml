# Build .deb package and publish APT repository to GitHub Pages
# Triggers on releases or manual dispatch
name: APT Repository Build 2

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  REPO_NAME: plexinstaller
  CODENAME: stable
  COMPONENTS: main
  ARCHITECTURES: amd64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version from version.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building plexinstaller v${VERSION}"

      - name: Build .deb package
        run: |
          chmod +x debian/build-deb.sh
          debian/build-deb.sh

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import GPG key
        run: |
          echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import

      - name: Get GPG fingerprint
        id: gpg
        run: |
          FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)
          echo "fingerprint=${FINGERPRINT}" >> "$GITHUB_OUTPUT"

      - name: Create APT repository
        run: |
          REPO_DIR=$(mktemp -d)
          mkdir -p "${REPO_DIR}/conf"

          # Create distributions config
          cat > "${REPO_DIR}/conf/distributions" <<EOF
          Origin: ${{ env.REPO_NAME }}
          Label: ${{ env.REPO_NAME }}
          Suite: ${{ env.CODENAME }}
          Codename: ${{ env.CODENAME }}
          Components: ${{ env.COMPONENTS }}
          Architectures: ${{ env.ARCHITECTURES }}
          SignWith: ${{ steps.gpg.outputs.fingerprint }}
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "${REPO_DIR}/conf/distributions"

          echo "=== distributions config ==="
          cat "${REPO_DIR}/conf/distributions"

          # Include all .deb packages
          for deb in dist/*.deb; do
            echo "Including ${deb}..."
            reprepro -b "${REPO_DIR}" -C ${{ env.COMPONENTS }} includedeb ${{ env.CODENAME }} "${deb}"
          done

          # Export public key
          gpg --armor --export ${{ steps.gpg.outputs.fingerprint }} > "${REPO_DIR}/gpg.key"

          # Copy CNAME for custom domain
          cp CNAME "${REPO_DIR}/CNAME"

          echo "repo_dir=${REPO_DIR}" >> "$GITHUB_OUTPUT"
        id: repo

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ${{ steps.repo.outputs.repo_dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add install instructions to summary
        run: |
          echo '## APT Repository Published :rocket:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Add the repository to your system:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Add the signing key' >> $GITHUB_STEP_SUMMARY
          echo 'curl -fsSL https://apt.plexdev.xyz/gpg.key | sudo tee /etc/apt/trusted.gpg.d/plexinstaller.asc > /dev/null' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Add the repository' >> $GITHUB_STEP_SUMMARY
          echo 'echo "deb https://apt.plexdev.xyz stable main" | sudo tee /etc/apt/sources.list.d/plexinstaller.list' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Install' >> $GITHUB_STEP_SUMMARY
          echo 'sudo apt update && sudo apt install plexinstaller' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
